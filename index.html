<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'idées de personnage</title>
    <!-- Roboto from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Material Design inspired styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-weight: 600;
            font-size: 28px;
        }

        .parameter-container {
            margin-bottom: 30px;
        }

        .parameter-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .parameter-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .parameter-value {
            font-size: 24px;
            color: #333;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
            flex: 1;
        }

        .reroll-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            white-space: nowrap;
            min-width: 50px;
        }

        .reroll-button:hover {
            background: #5568d3;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            transform: translateY(-1px);
        }

        .reroll-button:active {
            transform: translateY(0);
        }

        .reroll-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Guide button: shown to the left of Race value when guide exists */
        .guide-button {
            background: #5c6bc0;
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(92, 107, 192, 0.3);
            transition: all 0.3s ease;
            white-space: nowrap;
            min-width: 50px;
        }
        .guide-button:hover {
            background: #3f51b5;
            box-shadow: 0 4px 12px rgba(92, 107, 192, 0.4);
            transform: translateY(-1px);
        }
        .guide-button:active {
            transform: translateY(0);
        }
        .guide-button.hidden {
            display: none;
        }

        /* Full-screen overlay for race reference guide */
        .reference-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: auto;
        }
        .reference-overlay.is-open {
            display: flex;
        }
        /* Portrait-oriented content box to maximize portrait image size */
        .reference-overlay-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            height: 90vh;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
            position: relative;
            /* Top padding reserves space for close button so it never overlaps text/image */
            padding: 56px 24px 24px 24px;
        }
        /* When no image is shown, content shrinks to fit text only (no blank space) */
        .reference-overlay.reference-overlay-no-image .reference-overlay-content {
            height: auto;
            max-height: 90vh;
            overflow-y: auto;
        }
        .reference-overlay.reference-overlay-no-image .reference-overlay-text {
            max-height: none;
        }
        .reference-overlay-close {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 2;
            width: 40px;
            height: 40px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .reference-overlay-close:hover {
            background: #e0e0e0;
            color: #000;
        }
        /* Image grows to fill available space (portrait maximized) */
        .reference-overlay-image {
            width: 100%;
            flex: 1 1 0;
            min-height: 0;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 16px;
            background: #f5f5f5;
        }
        .reference-overlay-image.hidden {
            display: none;
        }
        /* Full-size image mode: image fills overlay, text hidden; toggled by clicking image */
        .reference-overlay.reference-overlay-image-fullsize .reference-overlay-content {
            max-width: none;
            width: 100%;
            height: 100%;
            padding: 56px 24px 24px;
        }
        .reference-overlay.reference-overlay-image-fullsize .reference-overlay-image {
            flex: 1 1 0;
            min-height: 0;
            cursor: pointer;
        }
        .reference-overlay.reference-overlay-image-fullsize .reference-overlay-text {
            display: none;
        }
        /* Text stays below image, scrolls if needed */
        .reference-overlay-text {
            flex: 0 0 auto;
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            overflow-y: auto;
            max-height: 40vh;
        }

        .parameter-value.animating {
            background: #e3f2fd;
        }

        .parameter-value .slot-item {
            position: absolute;
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.1s ease, transform 0.1s ease;
        }

        .parameter-value .slot-item.active {
            opacity: 1;
            transform: translateY(0);
            position: relative;
        }

        .generate-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .generate-button:hover {
            background: #5568d3;
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
        }

        .generate-button:active {
            transform: translateY(0);
        }

        .generate-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Générateur d'idées de personnage</h1>
        
        <div class="parameter-container">
            <div class="parameter-label">Race</div>
            <div class="parameter-row">
                <button type="button" class="guide-button hidden" id="race-guide-btn" title="Voir le guide de référence">📖</button>
                <div class="parameter-value" id="race-value">-</div>
                <button class="reroll-button" id="race-reroll" title="Réinitialiser la race">↻</button>
            </div>
        </div>

        <div class="parameter-container">
            <div class="parameter-label">Métier</div>
            <div class="parameter-row">
                <div class="parameter-value" id="metier-value">-</div>
                <button class="reroll-button" id="metier-reroll" title="Réinitialiser le métier">↻</button>
            </div>
        </div>

        <div class="parameter-container">
            <div class="parameter-label">Armes</div>
            <div class="parameter-row">
                <div class="parameter-value" id="armes-value">-</div>
                <button class="reroll-button" id="armes-reroll" title="Réinitialiser les armes">↻</button>
            </div>
        </div>

        <div class="parameter-container">
            <div class="parameter-label">Pouvoir</div>
            <div class="parameter-row">
                <div class="parameter-value" id="pouvoir-value">-</div>
                <button class="reroll-button" id="pouvoir-reroll" title="Réinitialiser le pouvoir">↻</button>
            </div>
        </div>

        <button class="generate-button" id="generate-button">Générer une idée</button>
    </div>

    <!-- Full-screen overlay: reference guide for selected race -->
    <div class="reference-overlay" id="reference-overlay" aria-hidden="true">
        <div class="reference-overlay-content">
            <button type="button" class="reference-overlay-close" id="reference-overlay-close" title="Fermer">×</button>
            <img class="reference-overlay-image" id="reference-overlay-image" alt="" />
            <div class="reference-overlay-text" id="reference-overlay-text"></div>
        </div>
    </div>

    <script>
        // Map race display name (as shown in UI) to referenceGuide key and image filename
        const raceToKey = {
            'Humain': 'human',
            'Elfe': 'elf',
            'Nain': 'dwarf',
            'Gobelin': 'gobelin',
            'Troll': 'troll',
            'Démon': 'demon',
            'Ange': 'angel',
            'Minotaure': 'minotaur',
            'Vampire': 'vampire',
            'Géant': 'giant',
            'Pikachu': 'pikachu'
        };

        // Reference guide data (loaded from referenceCharacters/referenceGuide.txt)
        let referenceGuide = null;

        function loadReferenceGuide() {
            return fetch('referenceCharacters/referenceGuide.txt')
                .then(r => r.ok ? r.text() : Promise.reject(new Error('referenceGuide not found')))
                .then(text => {
                    const data = JSON.parse(text);
                    referenceGuide = data.character || data;
                    return referenceGuide;
                })
                .catch(() => {
                    referenceGuide = {};
                });
        }

        /** Get the race key for the currently displayed race (from #race-value). */
        function getCurrentRaceKey() {
            const el = document.getElementById('race-value');
            const text = (el.querySelector('.slot-item.active') || el).textContent.trim();
            return raceToKey[text] || null;
        }

        /** True if the current race has guide text in referenceGuide. */
        function hasGuideForCurrentRace() {
            if (!referenceGuide) return false;
            const key = getCurrentRaceKey();
            if (!key) return false;
            const entry = referenceGuide[key];
            return entry && entry.description && String(entry.description).trim().length > 0;
        }

        /** Show or hide the race guide button depending on whether current race has guide content. */
        function updateGuideButtonVisibility() {
            const btn = document.getElementById('race-guide-btn');
            if (hasGuideForCurrentRace()) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }

        /** Open the reference overlay with text and image for the current race. */
        function openReferenceOverlay() {
            const key = getCurrentRaceKey();
            if (!key || !referenceGuide || !referenceGuide[key]) return;
            const entry = referenceGuide[key];
            const textEl = document.getElementById('reference-overlay-text');
            const imgEl = document.getElementById('reference-overlay-image');
            textEl.textContent = entry.description || '';
            const imgSrc = `referenceCharacters/${key}.png`;
            imgEl.src = imgSrc;
            imgEl.alt = key;
            imgEl.classList.remove('hidden');
            const overlay = document.getElementById('reference-overlay');
            overlay.classList.remove('reference-overlay-image-fullsize');
            overlay.classList.add('reference-overlay-no-image');
            imgEl.onerror = () => {
                imgEl.classList.add('hidden');
                overlay.classList.add('reference-overlay-no-image');
            };
            imgEl.onload = () => {
                imgEl.classList.remove('hidden');
                overlay.classList.remove('reference-overlay-no-image');
            };
            overlay.classList.add('is-open');
            overlay.setAttribute('aria-hidden', 'false');
            imgEl.title = 'Cliquer pour afficher en pleine taille';
        }

        /** Toggle full-size image view in the overlay (click image to enter, click again to exit). */
        function toggleOverlayImageFullSize() {
            const imgEl = document.getElementById('reference-overlay-image');
            if (imgEl.classList.contains('hidden')) return;
            const overlay = document.getElementById('reference-overlay');
            overlay.classList.toggle('reference-overlay-image-fullsize');
            imgEl.title = overlay.classList.contains('reference-overlay-image-fullsize')
                ? 'Cliquer pour revenir à la vue normale'
                : 'Cliquer pour afficher en pleine taille';
        }

        /** Close the reference overlay. */
        function closeReferenceOverlay() {
            const overlay = document.getElementById('reference-overlay');
            overlay.classList.remove('is-open');
            overlay.setAttribute('aria-hidden', 'true');
        }
        document.getElementById('reference-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'reference-overlay') closeReferenceOverlay();
        });

        // Parameters: race, metier, armes, pouvoir (loaded from Parameters.txt)
        const parameters = {
            race: [
                "Humain",
                "Elfe",
                "Nain",
                "Gobelin",
                "Troll",
                "Démon",
                "Ange",
                "Minotaure",
                "Vampire",
                "Géant",
                "Pikachu"
            ],
            metier: [
                "Guerrier",
                "Mage",
                "Forgeron",
                "Ninja",
                "Viking",
                "Chevalier",
                "Assassin",
                "Rôdeur",
                "Alchimiste",
                "Chasseur de monstres",
                "Sorcier",
                "Druide",
                "Gladiateur",
                "Samouraï",
                "Pirate"
            ],
            armes: [
                "Épée et bouclier",
                "Épée à deux mains",
                "Double dagues",
                "Arc long",
                "Lance",
                "Hache de guerre",
                "Marteau de guerre",
                "Bâton magique",
                "Faux",
                "Faucille",
                "Trident",
                "Couteaux de lancer",
                "Griffes métalliques",
                "Massue",
                "Fouet",
                "Shuriken"
            ],
            pouvoir: [
                "Aucun pouvoir magique",
                "Maîtrise du feu",
                "Maîtrise de la terre",
                "Maîtrise de l'air",
                "Électricité",
                "Nécromancie",
                "Guérison",
                "Télékinésie",
                "Rapidité",
                "Contrôle des ombres",
                "Transformation animale",
                "Peau de pierre",
                "Vol",
                "Explosion"
            ]
        };

        // Slot machine animation function
        function animateParameter(elementId, values, duration = 2000) {
            const element = document.getElementById(elementId);
            element.classList.add('animating');
            element.innerHTML = '';

            const startTime = Date.now();
            const interval = 50; // Update every 50ms for smooth animation
            let lastUpdate = startTime;

            function update() {
                const now = Date.now();
                const elapsed = now - startTime;
                const progress = elapsed / duration;

                if (progress < 1) {
                    // Show random value during animation
                    const randomValue = values[Math.floor(Math.random() * values.length)];
                    element.innerHTML = `<div class="slot-item active">${randomValue}</div>`;
                    
                    setTimeout(update, interval);
                } else {
                    // Animation complete - show final random value
                    const finalValue = values[Math.floor(Math.random() * values.length)];
                    element.innerHTML = `<div class="slot-item active">${finalValue}</div>`;
                    element.classList.remove('animating');
                }
            }

            update();
        }

        // Generate idea function
        function generateIdea() {
            const button = document.getElementById('generate-button');
            button.disabled = true;

            // Animate all parameters simultaneously
            animateParameter('race-value', parameters.race, 1000);
            animateParameter('metier-value', parameters.metier, 1200);
            animateParameter('armes-value', parameters.armes, 1400);
            animateParameter('pouvoir-value', parameters.pouvoir, 1600);

            // Re-enable button after all animations complete
            setTimeout(() => {
                button.disabled = false;
                updateGuideButtonVisibility();
            }, 2600);
        }

        // Function to reroll a single parameter
        function rerollParameter(parameterKey, elementId, buttonId) {
            const button = document.getElementById(buttonId);
            button.disabled = true;
            
            // Animate the single parameter
            animateParameter(elementId, parameters[parameterKey], 1000);
            
            // Re-enable button after animation completes
            setTimeout(() => {
                button.disabled = false;
            }, 1500);
        }

        // Event listener for generate button
        document.getElementById('generate-button').addEventListener('click', generateIdea);

        // Event listeners for individual reroll buttons
        document.getElementById('race-reroll').addEventListener('click', () => {
            rerollParameter('race', 'race-value', 'race-reroll');
            setTimeout(updateGuideButtonVisibility, 1100);
        });

        document.getElementById('metier-reroll').addEventListener('click', () => {
            rerollParameter('metier', 'metier-value', 'metier-reroll');
        });

        document.getElementById('armes-reroll').addEventListener('click', () => {
            rerollParameter('armes', 'armes-value', 'armes-reroll');
        });

        document.getElementById('pouvoir-reroll').addEventListener('click', () => {
            rerollParameter('pouvoir', 'pouvoir-value', 'pouvoir-reroll');
        });

        // Race reference guide: load data, then show/hide guide button and wire overlay
        loadReferenceGuide().then(() => {
            updateGuideButtonVisibility();
        });
        document.getElementById('race-guide-btn').addEventListener('click', openReferenceOverlay);
        document.getElementById('reference-overlay-close').addEventListener('click', closeReferenceOverlay);
        document.getElementById('reference-overlay-image').addEventListener('click', toggleOverlayImageFullSize);
    </script>
</body>
</html>
